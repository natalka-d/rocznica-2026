<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nasza Rocznica: Challenge ❤️</title>
    <style>
        :root { --main-red: #ff3860; --dark-red: #d61f43; --text-color: #333; }
        
        body { 
            margin: 0; 
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%); 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            color: var(--text-color); 
            overflow-x: hidden; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
        }
        
        /* TŁO - ANIMOWANE SERDUSZKA */
        #bg-hearts { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: -1; }
        .bg-heart { position: absolute; color: rgba(255, 56, 96, 0.1); animation: floatBG 15s infinite linear; }
        @keyframes floatBG { 
            0% { transform: translateY(110vh) rotate(0deg); } 
            100% { transform: translateY(-10vh) rotate(360deg); } 
        }

        /* EKRANY */
        #start-screen, #game-container { 
            text-align: center; 
            max-width: 450px; 
            padding: 30px; 
            margin-top: 10vh; 
            background: rgba(255,255,255,0.9); 
            border-radius: 30px; 
            backdrop-filter: blur(10px); 
            box-shadow: 0 20px 50px rgba(0,0,0,0.1); 
        }

        h1 { color: var(--main-red); font-size: 2.2rem; margin-bottom: 15px; }
        .btn { 
            background: var(--main-red); 
            color: white; 
            border: none; 
            padding: 18px 45px; 
            font-size: 1.3rem; 
            border-radius: 50px; 
            cursor: pointer; 
            transition: 0.3s; 
            box-shadow: 0 10px 20px rgba(255,56,96,0.3);
            font-weight: bold;
        }
        .btn:hover { transform: scale(1.05); background: var(--dark-red); }

        /* GRA */
        canvas { 
            background: #fff; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
            cursor: none; 
            display: none; 
            max-width: 100%; 
            touch-action: none;
            margin-top: 20px;
        }
        .stat { font-size: 1.5rem; font-weight: bold; color: var(--main-red); margin-bottom: 15px; }

        /* SEKCJA NAGRODY */
        #reward-section { display: none; width: 100%; max-width: 900px; padding: 60px 20px; text-align: center; }
        .sweet-title { font-size: 2.8rem; color: var(--main-red); margin-bottom: 20px; }
        
        .moment-category { margin-bottom: 60px; }
        .category-title { font-size: 1.8rem; color: var(--dark-red); margin-bottom: 25px; border-bottom: 2px solid var(--main-red); display: inline-block; }
        
        .photo-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
            gap: 20px; 
            padding: 10px; 
        }
        .photo-item { 
            background: white; 
            padding: 10px; 
            border-radius: 15px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
            transition: 0.3s; 
        }
        .photo-item:hover { transform: rotate(3deg) scale(1.05); }
        .photo-item img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 10px; }

        .gift-hint { 
            background: #fff; 
            padding: 30px; 
            border-radius: 20px; 
            border: 3px dashed var(--main-red); 
            margin-top: 50px; 
            font-size: 1.4rem;
        }
    </style>
</head>
<body>

    <div id="bg-hearts"></div>

    <div id="start-screen">
        <h1>Nasza Rocznica ❤️</h1>
        <p>Złap 30 serduszek, aby odblokować nasze wspomnienia!</p>
        <button class="btn" onclick="startGame()">START</button>
    </div>

    <div id="game-container" style="display:none;">
        <div class="stat">Serce: <span id="score">0</span> / 30</div>
        <canvas id="gameCanvas"></canvas>
    </div>

    <div id="reward-section">
        <h1 class="sweet-title">Udało się! Kocham Cię! 🏆</h1>
        
        <div class="moment-category">
            <h2 class="category-title">Wspólne wyjazdy 🚗</h2>
            <div class="photo-grid">
                <div class="photo-item"><img src="wyjazd1.jpg"></div>
                <div class="photo-item"><img src="wyjazd2.jpg"></div>
                <div class="photo-item"><img src="wyjazd3.jpg"></div>
            </div>
        </div>

        <div class="moment-category">
            <h2 class="category-title">Śmieszne chwile 🤪</h2>
            <div class="photo-grid">
                <div class="photo-item"><img src="smieszne1.jpg"></div>
                <div class="photo-item"><img src="smieszne2.jpg"></div>
                <div class="photo-item"><img src="smieszne3.jpg"></div>
            </div>
        </div>

        <div class="moment-category">
            <h2 class="category-title">Nasze imprezy 🎉</h2>
            <div class="photo-grid">
                <div class="photo-item"><img src="impreza1.jpg"></div>
                <div class="photo-item"><img src="impreza2.jpg"></div>
                <div class="photo-item"><img src="impreza3.jpg"></div>
            </div>
        </div>

        <div class="gift-hint">
            <p>Dziękuję za ten rok! ❤️</p>
            <p><b>Twój prezent czeka tam, gdzie procesor najbardziej się grzeje...</b></p>
        </div>
    </div>

    <script>
        // Animowane tło
        const bg = document.getElementById('bg-hearts');
        for(let i=0; i<20; i++) {
            const h = document.createElement('div');
            h.className = 'bg-heart';
            h.innerHTML = '❤️';
            h.style.left = Math.random() * 100 + 'vw';
            h.style.fontSize = (Math.random() * 20 + 10) + 'px';
            h.style.animationDuration = (Math.random() * 5 + 10) + 's';
            h.style.opacity = Math.random() * 0.5;
            bg.appendChild(h);
        }

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');

        let score = 0;
        let gameActive = false;
        let player = { x: 150, y: 0, size: 60 };
        let items = [];

        function startGame() {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('game-container').style.display = 'block';
            canvas.style.display = 'block';
            
            canvas.width = Math.min(window.innerWidth - 60, 400);
            canvas.height = 450;
            player.y = canvas.height - 80;
            
            gameActive = true;
            loop();
        }

        // Sterowanie
        function move(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            player.x = clientX - rect.left - player.size/2;
        }
        canvas.addEventListener('mousemove', move);
        canvas.addEventListener('touchmove', (e) => { move(e); e.preventDefault(); }, {passive: false});

        function loop() {
            if(!gameActive) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Gracz
            ctx.font = "50px Arial";
            ctx.fillText("👩‍❤️‍👨", player.x, player.y + 50);

            // Spadające serca
            if(Math.random() < 0.04) {
                items.push({ x: Math.random() * (canvas.width - 30), y: -30, speed: 3 + (score/15) });
            }

            items.forEach((item, index) => {
                item.y += item.speed;
                ctx.fillText("❤️", item.x, item.y);

                // Kolizja
                if(item.y > player.y && item.y < player.y + 60 && item.x > player.x - 20 && item.x < player.x + 60) {
                    score++;
                    scoreEl.innerText = score;
                    items.splice(index, 1);
                    if(score >= 30) win();
                }
                if(item.y > canvas.height) items.splice(index, 1);
            });

            requestAnimationFrame(loop);
        }

        function win() {
            gameActive = false;
            document.getElementById('game-container').style.display = 'none';
            document.getElementById('reward-section').style.display = 'block';
            window.scrollTo(0,0);
        }
    </script>
</body>
</html>
